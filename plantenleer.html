<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlantLab — Interactief Leersysteem</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0f0a;
  --surface: #111811;
  --surface2: #182018;
  --border: #2a3a2a;
  --green: #4ade80;
  --green-dim: #22c55e55;
  --green-bright: #86efac;
  --amber: #fbbf24;
  --red: #f87171;
  --blue: #60a5fa;
  --purple: #c084fc;
  --text: #e2f0e2;
  --text-dim: #7a9a7a;
  --text-muted: #4a6a4a;
  --radius: 12px;
  --glow: 0 0 30px #4ade8022;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ═══ NOISE OVERLAY ═══ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.4;
}

/* ═══ SCREEN SYSTEM ═══ */
.screen { display: none; }
.screen.active { display: block; }

/* ═══ HOME SCREEN ═══ */
#home {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  position: relative;
}

.bg-grid {
  position: fixed;
  inset: 0;
  background-image: 
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 60px 60px;
  opacity: 0.3;
  pointer-events: none;
}

.home-logo {
  font-family: 'Syne', sans-serif;
  font-size: clamp(48px, 8vw, 96px);
  font-weight: 800;
  color: var(--green);
  letter-spacing: -3px;
  text-shadow: 0 0 60px #4ade8055;
  animation: pulse-glow 3s ease-in-out infinite;
  margin-bottom: 8px;
}

@keyframes pulse-glow {
  0%, 100% { text-shadow: 0 0 40px #4ade8044; }
  50% { text-shadow: 0 0 80px #4ade8088, 0 0 120px #4ade8033; }
}

.home-sub {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 60px;
}

.progress-overview {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 32px;
  margin-bottom: 40px;
  width: 100%;
  max-width: 600px;
  display: flex;
  align-items: center;
  gap: 24px;
}

.xp-ring {
  width: 80px;
  height: 80px;
  flex-shrink: 0;
}

.xp-label {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 28px;
  color: var(--green);
}

.xp-sub {
  font-size: 13px;
  color: var(--text-dim);
}

.progress-bar-wrap {
  flex: 1;
}

.progress-bar-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 8px;
  font-family: 'Space Mono', monospace;
}

.progress-bar {
  height: 8px;
  background: var(--surface2);
  border-radius: 4px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--green-bright));
  border-radius: 4px;
  transition: width 0.6s cubic-bezier(.34,1.56,.64,1);
}

.modules-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 16px;
  width: 100%;
  max-width: 900px;
}

.module-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.module-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 60%, var(--module-color, #4ade8011));
  pointer-events: none;
}

.module-card:hover {
  border-color: var(--module-color, var(--green));
  transform: translateY(-2px);
  box-shadow: 0 8px 30px var(--module-color, #4ade8022);
}

.module-icon {
  font-size: 32px;
  margin-bottom: 12px;
}

.module-title {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--text);
}

.module-desc {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.5;
  margin-bottom: 16px;
}

.module-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.module-progress {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
}

.module-stars {
  display: flex;
  gap: 3px;
}

.star {
  font-size: 14px;
  opacity: 0.3;
  transition: opacity 0.2s;
}

.star.earned { opacity: 1; }

.badge-locked {
  position: absolute;
  top: 12px;
  right: 12px;
  font-size: 18px;
  opacity: 0.4;
}

/* ═══ QUIZ SCREEN ═══ */
#quiz {
  min-height: 100vh;
  padding: 20px;
  max-width: 760px;
  margin: 0 auto;
}

.quiz-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 32px;
  padding-top: 20px;
}

.back-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  transition: all 0.2s;
}

.back-btn:hover {
  border-color: var(--green);
  color: var(--green);
}

.quiz-module-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 20px;
  flex: 1;
}

.quiz-streak {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--amber);
  background: #fbbf2411;
  border: 1px solid #fbbf2433;
  padding: 6px 12px;
  border-radius: 6px;
}

.question-counter {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.q-num {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--text-muted);
}

.q-xp {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--green);
}

.progress-dots {
  display: flex;
  gap: 4px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  transition: all 0.3s;
}

.dot.current { background: var(--green); border-color: var(--green); }
.dot.correct { background: var(--green); border-color: var(--green); }
.dot.wrong { background: var(--red); border-color: var(--red); }

.question-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  margin-bottom: 20px;
  position: relative;
}

.question-type-badge {
  position: absolute;
  top: 16px;
  right: 16px;
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 2px;
}

.from-db-badge {
  position: absolute;
  top: 16px;
  left: 16px;
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  background: #c084fc22;
  color: var(--purple);
  border: 1px solid #c084fc44;
  padding: 3px 8px;
  border-radius: 4px;
  letter-spacing: 1px;
}

.question-text {
  font-family: 'Syne', sans-serif;
  font-size: clamp(16px, 2.5vw, 22px);
  font-weight: 600;
  line-height: 1.4;
  margin-bottom: 8px;
  padding-right: 80px;
}

.question-context {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 24px;
  font-style: italic;
  line-height: 1.5;
}

/* Multiple choice */
.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

@media (max-width: 500px) {
  .options-grid { grid-template-columns: 1fr; }
}

.option-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  cursor: pointer;
  text-align: left;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  line-height: 1.4;
  transition: all 0.15s;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.option-letter {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  background: var(--surface);
  border: 1px solid var(--border);
  width: 24px;
  height: 24px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
  transition: all 0.15s;
}

.option-btn:hover:not(:disabled) {
  border-color: var(--green);
  background: var(--green-dim);
}

.option-btn:hover:not(:disabled) .option-letter {
  background: var(--green);
  color: var(--bg);
  border-color: var(--green);
}

.option-btn.correct {
  border-color: var(--green);
  background: #4ade8022;
}

.option-btn.correct .option-letter {
  background: var(--green);
  color: var(--bg);
  border-color: var(--green);
}

.option-btn.wrong {
  border-color: var(--red);
  background: #f8717122;
}

.option-btn.wrong .option-letter {
  background: var(--red);
  color: #fff;
  border-color: var(--red);
}

/* Text input */
.text-input-wrap {
  position: relative;
}

.text-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 120px 16px 20px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s;
}

.text-input:focus { border-color: var(--green); }

.text-submit {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--green);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  padding: 10px 20px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s;
}

.text-submit:hover { opacity: 0.85; }

/* Drag & drop */
.drag-container {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.drop-targets {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.drop-row {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}

.drop-label {
  font-size: 14px;
  font-weight: 500;
  flex: 1;
  color: var(--text-dim);
}

.drop-zone {
  min-width: 160px;
  min-height: 36px;
  border: 2px dashed var(--border);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: var(--text-muted);
  transition: all 0.2s;
  padding: 6px 12px;
}

.drop-zone.over {
  border-color: var(--green);
  background: var(--green-dim);
  color: var(--green);
}

.drop-zone.filled {
  border-color: var(--green);
  background: #4ade8011;
  color: var(--text);
  cursor: pointer;
}

.drag-items {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  min-height: 44px;
  padding: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
}

.drag-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 14px;
  font-size: 13px;
  cursor: grab;
  transition: all 0.15s;
  user-select: none;
}

.drag-item:hover {
  border-color: var(--green);
  color: var(--green);
}

.drag-item.dragging {
  opacity: 0.4;
}

/* Feedback */
.feedback-box {
  border-radius: 12px;
  padding: 20px 24px;
  margin-top: 20px;
  display: none;
  animation: slide-up 0.3s ease;
}

@keyframes slide-up {
  from { transform: translateY(10px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.feedback-box.correct {
  background: #4ade8011;
  border: 1px solid #4ade8044;
}

.feedback-box.wrong {
  background: #f8717111;
  border: 1px solid #f8717144;
}

.feedback-title {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 8px;
}

.feedback-box.correct .feedback-title { color: var(--green); }
.feedback-box.wrong .feedback-title { color: var(--red); }

.feedback-text {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
}

.feedback-text strong { color: var(--green); }

.continue-btn {
  margin-top: 16px;
  background: var(--green);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  padding: 12px 28px;
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.continue-btn:hover { opacity: 0.85; }

/* ═══ SVG LABELING ═══ */
.label-container {
  position: relative;
  display: inline-block;
  width: 100%;
}

.label-svg {
  width: 100%;
  max-height: 320px;
  border-radius: 10px;
  background: #0d160d;
}

.label-options {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}

.label-chip {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 14px;
  font-size: 12px;
  font-family: 'Space Mono', monospace;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}

.label-chip:hover { border-color: var(--green); color: var(--green); }
.label-chip.selected { border-color: var(--green); background: var(--green-dim); color: var(--green); }
.label-chip.used { opacity: 0.35; pointer-events: none; }

.label-target {
  position: absolute;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--surface);
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  transform: translate(-50%, -50%);
}

.label-target.filled {
  background: var(--green);
  border-color: var(--green);
  color: var(--bg);
}

.label-target.wrong-fill {
  background: var(--red);
  border-color: var(--red);
  color: #fff;
}

/* ═══ FEEDBACKLOOP SCREEN ═══ */
.fl-diagram {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 20px;
}

/* ═══ RESULTS SCREEN ═══ */
#results {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
}

.results-score {
  font-family: 'Syne', sans-serif;
  font-size: 80px;
  font-weight: 800;
  color: var(--green);
  line-height: 1;
  margin-bottom: 8px;
  text-shadow: 0 0 60px #4ade8055;
}

.results-label {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 40px;
}

.results-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  max-width: 480px;
  margin-bottom: 40px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}

.stat-num {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--green);
}

.stat-label {
  font-size: 11px;
  color: var(--text-dim);
  font-family: 'Space Mono', monospace;
  text-transform: uppercase;
  margin-top: 4px;
}

.results-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
}

.btn-primary {
  background: var(--green);
  color: var(--bg);
  border: none;
  border-radius: 10px;
  padding: 14px 28px;
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s;
}

.btn-primary:hover { opacity: 0.85; }

.btn-secondary {
  background: none;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 28px;
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-secondary:hover {
  border-color: var(--green);
  color: var(--green);
}

/* ═══ ANIMATIONS ═══ */
@keyframes correct-pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.04); }
  100% { transform: scale(1); }
}

.pop { animation: correct-pop 0.3s ease; }

/* ═══ TOOLTIP ═══ */
.tooltip {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 12px;
  color: var(--text);
  pointer-events: none;
  z-index: 10000;
  max-width: 220px;
  box-shadow: 0 4px 20px #0008;
}

/* ═══ CONFETTI ═══ */
.confetti-piece {
  position: fixed;
  width: 8px;
  height: 8px;
  border-radius: 2px;
  pointer-events: none;
  animation: confetti-fall var(--dur, 1.5s) var(--delay, 0s) ease-in forwards;
  z-index: 9998;
}

@keyframes confetti-fall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(120vh) rotate(720deg); opacity: 0; }
}

/* ═══ PULSE CORRECT ═══ */
@keyframes pulse-correct {
  0% { box-shadow: 0 0 0 0 #4ade8055; }
  100% { box-shadow: 0 0 0 20px transparent; }
}

.pulse { animation: pulse-correct 0.5s ease; }

/* Responsive */
@media (max-width: 600px) {
  .results-grid { grid-template-columns: repeat(3, 1fr); }
  .question-card { padding: 20px; }
  .question-text { padding-right: 40px; }
}
</style>
</head>
<body>

<div class="bg-grid"></div>

<!-- ═══════════════ HOME ═══════════════ -->
<div id="home" class="screen active">
  <div class="home-logo">PlantLab</div>
  <div class="home-sub">Geavanceerd leersysteem · Plantenweefsels & Homeostase</div>

  <div class="progress-overview">
    <svg class="xp-ring" viewBox="0 0 80 80">
      <circle cx="40" cy="40" r="34" fill="none" stroke="#2a3a2a" stroke-width="8"/>
      <circle cx="40" cy="40" r="34" fill="none" stroke="#4ade80" stroke-width="8"
        stroke-dasharray="213.6" id="xp-ring-fill" stroke-dashoffset="213.6"
        stroke-linecap="round" transform="rotate(-90 40 40)" style="transition:stroke-dashoffset 1s ease"/>
      <text x="40" y="45" text-anchor="middle" fill="#4ade80" font-family="Syne,sans-serif" font-size="16" font-weight="800" id="xp-ring-text">0</text>
    </svg>
    <div class="progress-bar-wrap">
      <div class="progress-bar-label">
        <span>Totale voortgang</span>
        <span id="home-progress-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="home-progress-bar" style="width:0%"></div></div>
      <div style="margin-top:12px; font-size:13px; color:var(--text-dim);">
        <span id="home-mastered">0</span> succescriteria beheerst van <span id="home-total">0</span>
      </div>
    </div>
  </div>

  <div class="modules-grid" id="modules-grid"></div>
</div>

<!-- ═══════════════ QUIZ ═══════════════ -->
<div id="quiz" class="screen">
  <div class="quiz-header">

// RENDERING HOME
// ═══════════════════════════════════════════════════════

function renderHome() {
  const grid = document.getElementById('modules-grid');
  grid.innerHTML = '';

  let totalQ = 0, totalDone = 0;
  MODULES.forEach(m => {
    const qs = QUESTIONS[m.id] || [];
    const prog = state.moduleProgress[m.id] || { done: 0, total: qs.length, stars: 0 };
    totalQ += qs.length;
    totalDone += prog.done;

    const card = document.createElement('div');
    card.className = 'module-card';
    card.style.setProperty('--module-color', m.color + '22');
    card.onclick = () => startModule(m.id);

    const pct = qs.length ? Math.round((prog.done / qs.length) * 100) : 0;
    const stars = Math.min(3, prog.stars || 0);

    card.innerHTML = `
      <div class="module-icon">${m.icon}</div>
      <div class="module-title" style="color:${m.color}">${m.title}</div>
      <div class="module-desc">${m.desc}</div>
      <div class="module-meta">
        <span class="module-progress" style="color:${m.color}">${prog.done}/${qs.length} · ${pct}%</span>
        <div class="module-stars">
          ${[0,1,2].map(i => `<span class="star${i < stars ? ' earned' : ''}" style="color:${m.color}">★</span>`).join('')}
        </div>
      </div>
    `;
    grid.appendChild(card);
  });

  const pct = totalQ ? Math.round((totalDone / totalQ) * 100) : 0;
  document.getElementById('home-progress-bar').style.width = pct + '%';
  document.getElementById('home-progress-pct').textContent = pct + '%';
  document.getElementById('home-mastered').textContent = totalDone;
  document.getElementById('home-total').textContent = totalQ;

  const xpEl = document.getElementById('xp-ring-fill');
  const maxXP = totalQ * 15;
  const xpPct = Math.min(1, state.xp / Math.max(maxXP, 1));
  xpEl.style.strokeDashoffset = 213.6 * (1 - xpPct);
  document.getElementById('xp-ring-text').textContent = state.xp;
}

// ═══════════════════════════════════════════════════════
// MODULE START
// ═══════════════════════════════════════════════════════

function startModule(moduleId) {
  const mod = MODULES.find(m => m.id === moduleId);
  const qs = (QUESTIONS[moduleId] || []).slice();
  // Shuffle
  for (let i = qs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [qs[i], qs[j]] = [qs[j], qs[i]];
  }

  state.currentModule = mod;
  state.currentQuestions = qs;
  state.currentIdx = 0;
  state.streak = 0;
  state.sessionCorrect = 0;
  state.sessionWrong = 0;
  state.sessionXP = 0;
  state.wrongQuestions = [];
  state.dots = qs.map(() => 'pending');

  document.getElementById('quiz-title').textContent = mod.title;
  document.getElementById('quiz-title').style.color = mod.color;
  renderDots();
  showScreen('quiz');
  renderQuestion();
}

function retryWeak() {
  if (state.wrongQuestions.length === 0) {
    goHome();
    return;
  }
  const mod = state.currentModule;
  state.currentQuestions = [...state.wrongQuestions];
  state.currentIdx = 0;
  state.streak = 0;
  state.sessionCorrect = 0;
  state.sessionWrong = 0;
  state.sessionXP = 0;
  state.wrongQuestions = [];
  state.dots = state.currentQuestions.map(() => 'pending');
  renderDots();
  showScreen('quiz');
  renderQuestion();
}

// ═══════════════════════════════════════════════════════
// QUESTION RENDERING
// ═══════════════════════════════════════════════════════

let dragState = { dragging: null };
let labelState = { selected: null, answers: {} };

function renderQuestion() {
  const q = state.currentQuestions[state.currentIdx];
  if (!q) { showResults(); return; }

  const total = state.currentQuestions.length;
  document.getElementById('q-counter').textContent = `Vraag ${state.currentIdx + 1} / ${total}`;
  document.getElementById('q-xp').textContent = `+${q.type === 'drag' || q.type === 'label' ? 20 : 10} XP`;
  document.getElementById('quiz-streak').textContent = `🔥 ${state.streak}`;
  document.getElementById('question-text').textContent = q.q;

  const ctx = document.getElementById('question-context');
  if (q.context) { ctx.style.display = 'block'; ctx.textContent = q.context; }
  else { ctx.style.display = 'none'; }

  const badge = document.getElementById('q-type-badge');
  const typeNames = { mc: 'Meerkeuze', text: 'Invulvraag', drag: 'Koppelen', label: 'Labelen' };
  badge.textContent = typeNames[q.type] || '';

  const dbBadge = document.getElementById('q-db-badge');
  dbBadge.style.display = q.fromDB ? 'inline-block' : 'none';

  document.getElementById('feedback-box').style.display = 'none';

  const body = document.getElementById('question-body');
  body.innerHTML = '';

  if (q.type === 'mc') renderMC(q, body);
  else if (q.type === 'text') renderText(q, body);
  else if (q.type === 'drag') renderDrag(q, body);
  else if (q.type === 'label') renderLabel(q, body);
}

function renderMC(q, body) {
  const grid = document.createElement('div');
  grid.className = 'options-grid';
  const letters = ['A','B','C','D'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => answerMC(i, q, grid);
    grid.appendChild(btn);
  });
  body.appendChild(grid);
}

function answerMC(chosen, q, grid) {
  const btns = grid.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);

  const correct = chosen === q.correct;
  btns[chosen].classList.add(correct ? 'correct' : 'wrong');
  if (!correct) btns[q.correct].classList.add('correct');

  handleAnswer(correct, q);
}

function renderText(q, body) {
  const wrap = document.createElement('div');
  wrap.className = 'text-input-wrap';
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'text-input';
  inp.placeholder = 'Schrijf je antwoord hier...';
  inp.autocomplete = 'off';

  const btn = document.createElement('button');
  btn.className = 'text-submit';
  btn.textContent = 'Bevestig';

  const submit = () => {
    const val = inp.value.toLowerCase().trim();
    if (!val) return;
    inp.disabled = true;
    btn.disabled = true;
    const hit = q.keywords.some(k => val.includes(k.toLowerCase()));
    handleAnswer(hit, q);
  };

  btn.onclick = submit;
  inp.onkeydown = e => { if (e.key === 'Enter') submit(); };

  wrap.appendChild(inp);
  wrap.appendChild(btn);
  body.appendChild(wrap);
  setTimeout(() => inp.focus(), 50);
}

function renderDrag(q, body) {
  const cont = document.createElement('div');
  cont.className = 'drag-container';

  // Shuffle answers
  const answers = q.pairs.map(p => p.answer).sort(() => Math.random() - 0.5);
  const assigned = {};

  const dropsHTML = q.pairs.map((pair, i) => `
    <div class="drop-row">
      <div class="drop-label">${pair.label}</div>
      <div class="drop-zone" id="dz-${i}" data-index="${i}">${answers.includes(pair.answer) ? 'Sleep hier...' : ''}</div>
    </div>
  `).join('');

  const itemsHTML = answers.map(a => `<div class="drag-item" draggable="true" data-value="${a}">${a}</div>`).join('');

  cont.innerHTML = `
    <div class="drop-targets">${dropsHTML}</div>
    <div class="drag-items" id="drag-pool">${itemsHTML}</div>
  `;
  body.appendChild(cont);

  // Drag events
  cont.querySelectorAll('.drag-item').forEach(item => {
    item.addEventListener('dragstart', e => {
      dragState.dragging = item;
      item.classList.add('dragging');
      e.dataTransfer.setData('text', item.dataset.value);
    });
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging');
    });
  });

  cont.querySelectorAll('.drop-zone').forEach(zone => {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('over');
      const val = e.dataTransfer.getData('text');
      const idx = parseInt(zone.dataset.index);
      // If zone was filled, return old item to pool
      if (zone.dataset.filled) {
        const pool = document.getElementById('drag-pool');
        const old = document.createElement('div');
        old.className = 'drag-item';
        old.draggable = true;
        old.dataset.value = zone.dataset.filled;
        old.textContent = zone.dataset.filled;
        attachDragItem(old, cont);
        pool.appendChild(old);
      }
      // Remove item from wherever it was
      if (dragState.dragging) dragState.dragging.remove();
      zone.textContent = val;
      zone.classList.add('filled');
      zone.dataset.filled = val;
      assigned[idx] = val;

      // Check if all filled
      const allFilled = Object.keys(assigned).length === q.pairs.length;
      if (allFilled) {
        let allCorrect = true;
        cont.querySelectorAll('.drop-zone').forEach((z, i) => {
          if (z.dataset.filled !== q.pairs[i].answer) allCorrect = false;
        });
        handleAnswer(allCorrect, q);
      }
    });
  });
}

function attachDragItem(item, cont) {
  item.addEventListener('dragstart', e => {
    dragState.dragging = item;
    item.classList.add('dragging');
    e.dataTransfer.setData('text', item.dataset.value);
  });
  item.addEventListener('dragend', () => item.classList.remove('dragging'));
}

function renderLabel(q, body) {
  labelState = { selected: null, answers: {} };

  const container = document.createElement('div');
  container.style.position = 'relative';
  container.style.display = 'inline-block';
  container.style.width = '100%';

  // Draw leaf SVG
  const svg = drawLeafSVG(q.labels);
  container.appendChild(svg);
  body.appendChild(container);

  // Label options
  const chips = document.createElement('div');
  chips.className = 'label-options';
  chips.id = 'label-chips';
  q.options.forEach(opt => {
    const chip = document.createElement('div');
    chip.className = 'label-chip';
    chip.textContent = opt;
    chip.onclick = () => selectChip(opt, chip, q, body);
    chips.appendChild(chip);
  });
  body.appendChild(chips);
}

function selectChip(val, chip, q, body) {
  // Toggle selection
  document.querySelectorAll('.label-chip').forEach(c => c.classList.remove('selected'));
  if (labelState.selected === val) {
    labelState.selected = null;
    return;
  }
  labelState.selected = val;
  chip.classList.add('selected');
}

function clickLabel(id, q, body) {
  if (!labelState.selected) return;
  const target = document.getElementById(`lt-${id}`);
  const label = q.labels.find(l => l.id === id);
  const answer = labelState.selected;

  target.textContent = id;
  target.classList.add('filled');
  labelState.answers[id] = answer;

  // Mark chip used
  document.querySelectorAll('.label-chip').forEach(c => {
    if (c.textContent === answer) c.classList.add('used');
  });
  labelState.selected = null;
  document.querySelectorAll('.label-chip').forEach(c => c.classList.remove('selected'));

  // Check if all filled
  if (Object.keys(labelState.answers).length === q.labels.length) {
    let correct = true;
    q.labels.forEach(l => {
      if (labelState.answers[l.id] !== l.answer) {
        correct = false;
        const t = document.getElementById(`lt-${l.id}`);
        t.classList.remove('filled');
        t.classList.add('wrong-fill');
      }
    });
    handleAnswer(correct, q);
  }
}

function drawLeafSVG(labels) {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 400 200');
  svg.setAttribute('class', 'label-svg');
  svg.style.width = '100%';

  // Background
  const bg = document.createElementNS(ns, 'rect');
  bg.setAttribute('width', '400'); bg.setAttribute('height', '200');
  bg.setAttribute('fill', '#0d160d'); svg.appendChild(bg);

  // Cuticula
  const cut = document.createElementNS(ns, 'rect');
  cut.setAttribute('x','20'); cut.setAttribute('y','8');
  cut.setAttribute('width','360'); cut.setAttribute('height','8');
  cut.setAttribute('rx','3'); cut.setAttribute('fill','#a16207');
  svg.appendChild(cut);
  const cutL = document.createElementNS(ns, 'text');
  cutL.setAttribute('x','200'); cutL.setAttribute('y','15');
  cutL.setAttribute('text-anchor','middle'); cutL.setAttribute('font-size','7');
  cutL.setAttribute('fill','#fbbf24'); cutL.textContent = 'Cuticula';
  svg.appendChild(cutL);

  // Epidermis top
  const ep1 = document.createElementNS(ns, 'rect');
  ep1.setAttribute('x','20'); ep1.setAttribute('y','20');
  ep1.setAttribute('width','360'); ep1.setAttribute('height','14');
  ep1.setAttribute('rx','2'); ep1.setAttribute('fill','#1a3a1a');
  svg.appendChild(ep1);
  addLabel(svg, ns, '200', '29', 'Epidermis (bov.)');

  // Pallisade
  for (let i = 0; i < 9; i++) {
    const r = document.createElementNS(ns, 'rect');
    r.setAttribute('x', (25 + i * 38).toString()); r.setAttribute('y','38');
    r.setAttribute('width','30'); r.setAttribute('height','35');
    r.setAttribute('rx','3'); r.setAttribute('fill','#14532d');
    r.setAttribute('stroke','#22c55e33'); r.setAttribute('stroke-width','0.5');
    svg.appendChild(r);
    const c = document.createElementNS(ns, 'circle');
    c.setAttribute('cx', (40 + i * 38).toString()); c.setAttribute('cy','55');
    c.setAttribute('r','6'); c.setAttribute('fill','#16a34a');
    svg.appendChild(c);
  }
  addLabel(svg, ns, '200', '50', 'Pallisadeparenchym');

  // Sponge
  const spongeColors = ['#166534','#14532d','#15803d','#166534'];
  for (let i = 0; i < 12; i++) {
    const e = document.createElementNS(ns, 'ellipse');
    const cx = 30 + (i % 6) * 60 + (Math.floor(i/6) * 30);
    const cy = 100 + (Math.floor(i/6) * 18);
    e.setAttribute('cx', cx.toString()); e.setAttribute('cy', cy.toString());
    e.setAttribute('rx','18'); e.setAttribute('ry','9');
    e.setAttribute('fill', spongeColors[i % 4]);
    svg.appendChild(e);
  }
  addLabel(svg, ns, '200', '108', 'Sponsparenchym');

  // Vaatbundel
  const vb = document.createElementNS(ns, 'rect');
  vb.setAttribute('x','60'); vb.setAttribute('y','75');
  vb.setAttribute('width','55'); vb.setAttribute('height','50');
  vb.setAttribute('rx','5'); vb.setAttribute('fill','#1e3a5f');
  vb.setAttribute('stroke','#60a5fa44'); vb.setAttribute('stroke-width','1');
  svg.appendChild(vb);
  // xyleem inside bundle
  const xy = document.createElementNS(ns, 'rect');
  xy.setAttribute('x','68'); xy.setAttribute('y','78');
  xy.setAttribute('width','20'); xy.setAttribute('height','20');
  xy.setAttribute('rx','3'); xy.setAttribute('fill','#3b82f6');
  svg.appendChild(xy);
  const xyL = document.createElementNS(ns, 'text');
  xyL.setAttribute('x','78'); xyL.setAttribute('y','91');
  xyL.setAttribute('text-anchor','middle'); xyL.setAttribute('font-size','5.5');
  xyL.setAttribute('fill','#bfdbfe'); xyL.textContent = 'X';
  svg.appendChild(xyL);
  // floem inside bundle
  const fl = document.createElementNS(ns, 'rect');
  fl.setAttribute('x','90'); fl.setAttribute('y','98');
  fl.setAttribute('width','18'); fl.setAttribute('height','20');
  fl.setAttribute('rx','3'); fl.setAttribute('fill','#7c3aed');
  svg.appendChild(fl);
  const flL = document.createElementNS(ns, 'text');
  flL.setAttribute('x','99'); flL.setAttribute('y','111');
  flL.setAttribute('text-anchor','middle'); flL.setAttribute('font-size','5.5');
  flL.setAttribute('fill','#ddd6fe'); flL.textContent = 'F';
  svg.appendChild(flL);
  addLabel(svg, ns, '87', '135', 'Vaatbundel');

  // Epidermis bottom
  const ep2 = document.createElementNS(ns, 'rect');
  ep2.setAttribute('x','20'); ep2.setAttribute('y','130');
  ep2.setAttribute('width','360'); ep2.setAttribute('height','14');
  ep2.setAttribute('rx','2'); ep2.setAttribute('fill','#1a3a1a');
  svg.appendChild(ep2);
  addLabel(svg, ns, '200', '140', 'Epidermis (ond.)');

  // Stomata
  const stL = document.createElementNS(ns, 'ellipse');
  stL.setAttribute('cx','280'); stL.setAttribute('cy','150');
  stL.setAttribute('rx','12'); stL.setAttribute('ry','6');
  stL.setAttribute('fill','#0a0f0a'); stL.setAttribute('stroke','#4ade80');
  stL.setAttribute('stroke-width','1.5');
  svg.appendChild(stL);
  const sc1 = document.createElementNS(ns, 'ellipse');
  sc1.setAttribute('cx','274'); sc1.setAttribute('cy','150');
  sc1.setAttribute('rx','6'); sc1.setAttribute('ry','5');
  sc1.setAttribute('fill','#14532d');
  svg.appendChild(sc1);
  const sc2 = document.createElementNS(ns, 'ellipse');
  sc2.setAttribute('cx','286'); sc2.setAttribute('cy','150');
  sc2.setAttribute('rx','6'); sc2.setAttribute('ry','5');
  sc2.setAttribute('fill','#14532d');
  svg.appendChild(sc2);
  addLabel(svg, ns, '290', '162', 'Huidmondje');

  // Numbered hotspots
  labels.forEach(l => {
    const posX = (l.x / 100) * 400;
    const posY = (l.y / 100) * 200;

    // Line
    const line = document.createElementNS(ns, 'line');
    const offX = posX > 200 ? posX + 18 : posX - 18;

    const fo = document.createElementNS(ns, 'foreignObject');

    fo.setAttribute('width','28'); fo.setAttribute('height','28');
    fo.style.cursor = 'pointer';

    const div = document.createElement('div');
    div.id = `lt-${l.id}`;
    div.className = 'label-target';
    div.textContent = l.id;
    div.onclick = () => clickLabel(l.id, { labels }, document.getElementById('question-body'));

    fo.appendChild(div);
    svg.appendChild(fo);
  });

  return svg;
}

function addLabel(svg, ns, x, y, text) {
  const t = document.createElementNS(ns, 'text');
  t.setAttribute('x', x); t.setAttribute('y', y);
  t.setAttribute('text-anchor','middle'); t.setAttribute('font-size','6.5');
  t.setAttribute('fill','#4a6a4a'); t.setAttribute('font-family','Space Mono');
  t.textContent = text;
  svg.appendChild(t);
}

// ═══════════════════════════════════════════════════════
// ANSWER HANDLING
// ═══════════════════════════════════════════════════════

function handleAnswer(correct, q) {
  const xpGain = correct ? (q.type === 'drag' || q.type === 'label' ? 20 : 10) + (state.streak >= 3 ? 5 : 0) : 0;

  if (correct) {
    state.streak++;
    state.sessionCorrect++;
    state.sessionXP += xpGain;
    state.xp += xpGain;
    state.dots[state.currentIdx] = 'correct';
    confetti();
  } else {
    state.streak = 0;
    state.sessionWrong++;
    state.dots[state.currentIdx] = 'wrong';
    state.wrongQuestions.push(q);
  }

  document.getElementById('quiz-streak').textContent = `🔥 ${state.streak}`;
  renderDots();
  showFeedback(correct, q, xpGain);
}

function showFeedback(correct, q, xp) {
  const box = document.getElementById('feedback-box');
  const title = document.getElementById('feedback-title');
  const text = document.getElementById('feedback-text');

  box.className = `feedback-box ${correct ? 'correct' : 'wrong'}`;
  box.style.display = 'block';

  const corrects = ['Uitstekend!', 'Perfect! 🎯', 'Correct! 🌿', 'Bravo!', 'Precies goed!'];
  const wrongs = ['Niet helemaal...', 'Bijna!', 'Goed geprobeerd.', 'Nog even oefenen.'];

  title.textContent = correct
    ? (state.streak >= 3 ? `🔥 ${state.streak}× streak! +${xp} XP` : corrects[Math.floor(Math.random() * corrects.length)])
    : wrongs[Math.floor(Math.random() * wrongs.length)];

  text.innerHTML = q.feedback || '';
  if (q.fromDB) {
    text.innerHTML += '<br><br><em style="font-size:12px; color:var(--purple)">⚗ Deze uitleg is aangevuld vanuit de kennisbasis (niet uit info.txt)</em>';
  }

  box.classList.add('pop');
  box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function nextQuestion() {
  state.currentIdx++;
  if (state.currentIdx >= state.currentQuestions.length) {
    showResults();
  } else {
    renderQuestion();
    document.getElementById('feedback-box').style.display = 'none';
  }
}

// ═══════════════════════════════════════════════════════
// RESULTS
// ═══════════════════════════════════════════════════════

function showResults() {
  const total = state.currentQuestions.length;
  const pct = total ? Math.round((state.sessionCorrect / total) * 100) : 0;

  document.getElementById('results-score').textContent = pct + '%';
  document.getElementById('results-module-name').textContent = state.currentModule.title + ' — voltooid';
  document.getElementById('res-correct').textContent = state.sessionCorrect;
  document.getElementById('res-wrong').textContent = state.sessionWrong;
  document.getElementById('res-xp').textContent = '+' + state.sessionXP;

  // Stars
  const stars = pct >= 90 ? 3 : pct >= 70 ? 2 : pct >= 50 ? 1 : 0;
  const prog = state.moduleProgress[state.currentModule.id] || { done: 0, total: total, stars: 0 };
  prog.done = state.sessionCorrect;
  prog.stars = Math.max(prog.stars, stars);
  state.moduleProgress[state.currentModule.id] = prog;

  const weakEl = document.getElementById('weak-areas');
  if (state.wrongQuestions.length > 0) {
    weakEl.innerHTML = state.wrongQuestions.map(q =>
      `<div style="padding:6px 0; border-bottom:1px solid var(--border);">→ ${q.q.substring(0, 80)}${q.q.length > 80 ? '...' : ''}</div>`
    ).join('');
  } else {
    weakEl.innerHTML = '<div style="color:var(--green)">🎉 Geen fouten! Uitstekend beheerst!</div>';
  }

  if (pct >= 80) confetti(40);

  showScreen('results');
}

// ═══════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'home') renderHome();
  window.scrollTo(0, 0);
}

function goHome() {
  showScreen('home');
}

function renderDots() {
  const container = document.getElementById('progress-dots');
  container.innerHTML = '';
  state.dots.forEach((d, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot';
    if (i === state.currentIdx) dot.classList.add('current');
    else if (d === 'correct') dot.classList.add('correct');
    else if (d === 'wrong') dot.classList.add('wrong');
    container.appendChild(dot);
  });
}

function confetti(count = 20) {
  const colors = ['#4ade80', '#fbbf24', '#60a5fa', '#c084fc', '#f87171', '#86efac'];
  for (let i = 0; i < count; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = (20 + Math.random() * 60) + 'vw';
    piece.style.top = '-20px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.setProperty('--dur', (1 + Math.random()) + 's');
    piece.style.setProperty('--delay', (Math.random() * 0.5) + 's');
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 2500);
  }
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════

renderHome();
showScreen('home');
